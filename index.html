<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Karl & Jacqueline 25th Anniversary Celebration invitation." />
  <title>Karl & Jacqueline - 25th Anniversary Celebration</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --cream:#FDFBF7;
      --green:#0F2A1F;
      --silver:#4F6458;
      --card:rgba(255,255,255,.82);
      --shadow:0 10px 30px rgba(15,42,31,.08);
      --radius:18px;
      --max:1100px;
    }

    *{box-sizing:border-box}
    html{
      scroll-behavior:smooth;
      min-height:100%;
    }

    body{
      margin:0;
      min-height:100vh;
      position:relative;
      background:url("images/5.jpg") center/cover no-repeat fixed;
      color:var(--green);
      font-family:"Cinzel", serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.7;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(253,251,247,.42);
      z-index:0;
      pointer-events:none;
    }

    a{color:inherit}
    img,iframe{max-width:100%;display:block}

    h1, h2, h3, p, a, strong, .label {
      text-shadow: 0 1px 3px rgba(0,0,0,.12);
    }

    .skip{
      position:absolute;
      left:-9999px;
      top:auto;
      width:1px;
      height:1px;
      overflow:hidden;
    }

    .skip:focus{
      left:1rem;
      top:1rem;
      width:auto;
      height:auto;
      padding:.75rem 1rem;
      background:var(--green);
      color:var(--cream);
      z-index:9999;
      border-radius:10px;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(253,251,247,.94);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(15,42,31,.08);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:.85rem 1rem;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:1rem;
      flex-wrap:wrap;
      text-align:center;
    }

    .brand{
      text-decoration:none;
      font-weight:700;
      letter-spacing:.05em;
      font-size:.95rem;
      text-align:center;
      width:100%;
    }

    .nav button{
      border:1px solid var(--green);
      background:transparent;
      color:var(--green);
      border-radius:10px;
      padding:.55rem .9rem;
      font:inherit;
      margin:0 auto;
      display:block;
    }

    .nav ul{
      list-style:none;
      margin:0;
      padding:0;
      display:none;
      gap:1rem;
      flex-wrap:wrap;
      justify-content:center;
      width:100%;
    }

    .nav a{
      text-decoration:none;
      font-size:.95rem;
    }

    .nav.open ul{display:flex}

    .hero-wrap{
      position:relative;
      z-index:1;
      overflow:hidden;
    }

    .botanical{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.10;
      background:
        radial-gradient(circle at top left, rgba(15,42,31,.18), transparent 22%),
        radial-gradient(circle at top right, rgba(15,42,31,.12), transparent 22%),
        radial-gradient(circle at bottom left, rgba(79,100,88,.12), transparent 22%),
        radial-gradient(circle at bottom right, rgba(15,42,31,.15), transparent 22%);
      z-index:0;
    }

    main{
      position:relative;
      z-index:1;
      max-width:var(--max);
      margin:0 auto;
      padding:1rem;
    }

    section{
      margin:1rem 0 1.25rem;
      background:var(--card);
      border:1px solid rgba(15,42,31,.06);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:1;
    }

    section::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(255,255,255,.35);
      z-index:0;
      pointer-events:none;
    }

    section > *{
      position:relative;
      z-index:1;
    }

    .hero{
      min-height:68vh;
      display:grid;
      place-items:center;
      text-align:center;
      padding:2rem 1rem;
    }

    .eyebrow{
      font-family:"Great Vibes", cursive;
      font-size:clamp(1.5rem, 4vw, 2.6rem);
      margin:0 0 .35rem;
      color:var(--silver);
    }

    h1, h2, h3{
      margin:0;
      line-height:1.15;
    }

    h1{
      font-size:clamp(2rem, 7vw, 4.8rem);
      letter-spacing:.02em;
      text-wrap:balance;
    }

      padding:1rem;
